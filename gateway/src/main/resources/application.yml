server:
  port: ${GATEWAY_PORT:8088}

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        register-enabled: true
    gateway:
      routes:
        - id: auth-service-canary
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
            - Header=X-Canary, auth-service
        - id: order-service-canary
          uri: lb://order-service
          predicates:
            - Path=/orders/**
            - Header=X-Canary, order-service
        - id: monolith-default
          uri: ${MONOLITH_URL:http://localhost:8080}
          predicates:
            - Path=/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
