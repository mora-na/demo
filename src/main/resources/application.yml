# Jasypt 配置：指定配置加解密器，支持 ENC(...) 形式的密文属性
jasypt:
  encryptor:
    # StringEncryptor Bean 名称（需与 @Component(name=...) 一致）
    bean: jasyptStringEncryptor
    # 加解密口令（建议用环境变量覆盖）
    password: ${JASYPT_ENCRYPTOR_PASSWORD:encryptorPassword}

# 服务器配置
server:
  # Servlet 相关配置
  servlet:
    # 应用上下文路径
    context-path: /

# Spring Boot 核心配置
spring:
  # 应用元信息
  application:
    # 应用名称（用于注册、日志等）
    name: demo

  # 默认使用 dev 配置，可通过环境变量覆盖
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 控制台输出配置
  output:
    # ANSI 颜色输出配置
    ansi:
      # 是否启用 ANSI 颜色
      enabled: always

  # Servlet 容器配置
  servlet:
    # 文件上传配置
    multipart:
      # 单文件最大大小
      max-file-size: 120MB
      # 单请求最大大小
      max-request-size: 120MB

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # MyBatis 原生配置
  configuration:
    # 是否启用懒加载
    lazy-loading-enabled: true
    # 是否启用激进懒加载
    aggressive-lazy-loading: false

# SQL 日志配置
sql-log:
  # 是否打印 SQL（关闭后禁用 MyBatis SQL 日志）
  enabled: false

# Excel 导出性能配置
excel:
  # Excel 导出配置
  export:
    # 分页导出每页大小
    page-size: 1000
    # SXSSF 内存窗口行数
    row-window-size: 200
    # 是否启用共享字符串表
    use-shared-strings: false
    # 是否启用列宽自动计算
    auto-size: true
    # 自动列宽允许的最大行数
    auto-size-max-rows: 30
    # 分页时是否执行 count 查询
    count-enabled: false
    # 是否压缩临时文件
    compress-temp-files: true

# 日志配置
logging:
  # 日志编码配置
  charset:
    # 控制台编码
    console: UTF-8
    # 文件编码
    file: UTF-8
  # 日志格式配置
  pattern:
    # 控制台日志格式
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
    # 文件日志格式
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
  # Logback 滚动策略
  logback:
    # 滚动策略配置
    rollingpolicy:
      # 日志文件命名模式
      file-name-pattern: 'logs/${spring.application.name}%d{yyyy-MM-dd}.log'
      # 保留历史天数
      max-history: 30
      # 日志总大小上限
      total-size-cap: 1GB

# 安全与权限配置
security:
  # 公共排除路径配置
  common:
    # 公共排除路径列表
    exclude-paths:
      - /druid/** # 排除 Druid 监控
  # XSS 防护配置
  xss:
    # 是否启用 XSS 防护
    enabled: true
    # XSS 额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: [ ]
  # SQL 审计与防护配置
  sql-guard:
    # 是否启用 SQL 防护
    enabled: true
    # 是否阻止全表操作
    block-full-table: true
    # 是否阻止多语句执行
    block-multi-statement: true
  # 频率限制配置
  rate-limit:
    # 是否启用限流
    enabled: true
    # 限流窗口时长（秒）
    window-seconds: 60
    # 窗口内最大请求数
    max-requests: 100
    # 限流 Key 生成方式
    key-mode: ip
    # 限流 Key 是否包含路径
    include-path: true
    # 限流额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: [ ]
  # 重复提交防护配置
  duplicate-submit:
    # 是否启用重复提交防护
    enabled: true
    # 判定时间窗口（ms）
    interval-millis: 3000
    # 重复提交 Key 生成方式
    key-mode: ip
    # 重复提交 Key 是否包含路径
    include-path: true
    # 是否使用幂等键头
    use-idempotency-key: true
    # 幂等键 Header 名称
    header-name: Idempotency-Key
    # 是否包含请求体生成 Key
    include-body: true
    # 保护的 HTTP 方法
    methods:
      - POST # 方法：POST
      - PUT # 方法：PUT
      - PATCH # 方法：PATCH
      - DELETE # 方法：DELETE
    # 重复提交额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: [ ]
  # 权限配置
  permission:
    # 是否启用权限校验
    enabled: true
    # 默认要求登录
    require-login-by-default: true
    # 权限数据源
    source: db
    # 超级用户列表
    super-users:
      - master # 超级用户账号
    # 权限缓存时长（秒）
    cache-seconds: 600
    # 权限校验排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths:
      - /auth/** # 排除认证接口
      - /error # 排除错误接口
  # 数据范围配置
  data-scope:
    # 是否启用数据范围控制
    enabled: true
    # 默认数据范围类型
    default-type: ALL
    # 数据范围来源
    source: db
    # 数据范围缓存时长（秒）
    cache-seconds: 180
