server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: demo

  profiles:
    active: default

  output:
    ansi:
      enabled: always

  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 120MB

  redis:
    host: localhost
    port: 6379

  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
    dynamic:
      druid:
        wall:
          # 因为camunda框架的sql有where 1=1
          select-where-alway-true-check: false
          condition-and-alway-true-allow: true
      primary: master           # 指定默认数据源
      strict: false             # true: 未匹配报错；false: 使用默认
      datasource:
        master:
          url: jdbc:postgresql://localhost:5432/test?currentSchema=test
          username: angelabeini
          password: 1
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 1
            min-idle: 1
            max-active: 3
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            pool-prepared-statements: true
            max-pool-prepared-statement-per-connection-size: 20
            filters: stat,wall,slf4j
            connection-properties: >
              druid.stat.mergeSql=true;
              druid.stat.slowSqlMillis=5000;
              wall.config.multiStatementAllow=true;
              wall.config.noneBaseStatementAllow=true;
              removeAbandoned=true;
              removeAbandonedTimeout=180;
              logAbandoned=false;
              keepAlive=true;
              maxEvictableIdleTimeMillis=900000
