mybatis-plus:
  #配置扫描mapper XML文件
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

camunda:
  # 是否启用Camunda，关闭后不加载Camunda框架
  enabled: false
  bpm:
    enabled: ${camunda.enabled:true}
    webapp:
      enabled: ${camunda.enabled:true}
    rest:
      enabled: ${camunda.enabled:true}
    # 管理后台登录账号
    admin-user:
      id: admin
      password: admin
      first-name: Admin

    # 自动部署resources/bpmn下的流程文件
    auto-deployment-enabled: true

    # 数据库表结构策略
    # true: 自动创建表（开发环境）
    # false: 不自动创建（生产环境，用SQL脚本初始化）
    database:
      schema-update: true
      type: mysql

    # 历史数据记录级别
    # none/activity/audit/full，推荐audit
    history-level: audit

    # Job执行器（异步任务、定时器等）
    job-execution:
      enabled: true
      core-pool-size: 3
      max-pool-size: 10

logging:
  file:
    name: logs/demo.log
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
  level:
    root: info
    com: debug
    cn.com: debug
    org.springframework: warn
    org.springframework.web: warn
  logback:
    rollingpolicy:
      file-name-pattern: 'logs/demo.log%d{yyyy-MM-dd}.log'
      max-history: 30
      total-size-cap: 1GB

user:
  config:
    name: zhangsan
    age: 18
    roles:
      - admin
      - user
    settings:
      theme: dark
      notify: true

auth:
  jwt:
    secret: 0x0000$0001,06a7c00@00x000=0*00&010(784c000,0x00+000-001)0ea7c0+00
    ttl-seconds: 7200
  captcha:
    width: 120
    height: 40
    code-length: 4
    thickness: 2
    expire-seconds: 120
  password:
    mode: plain
    salt: "4a971387-649c-49f3-910d-1becc50a54e4"
  filter:
    enabled: true
    exclude-paths:
      - /auth/**
      - /error
      - /druid/**
      - /camunda/**
      - /engine-rest/**

security:
  xss:
    enabled: true
    exclude-paths:
      - /druid/**
      - /camunda/**
      - /engine-rest/**
  sql-guard:
    enabled: true
    block-full-table: true
    block-multi-statement: true
