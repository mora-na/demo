spring:
  application:
    name: demo

  profiles:
    active: default

  output:
    ansi:
      enabled: always

  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 120MB

  datasource:
    druid:
      stat-view-servlet:
