mybatis-plus:
  #配置扫描mapper XML文件
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

camunda:
  bpm:
    # 管理后台登录账号
    admin-user:
      id: admin
      password: admin
      first-name: Admin

    # 自动部署resources/bpmn下的流程文件
    auto-deployment-enabled: true

    # 数据库表结构策略
    # true: 自动创建表（开发环境）
    # false: 不自动创建（生产环境，用SQL脚本初始化）
    database:
      schema-update: true
      type: mysql

    # 历史数据记录级别
    # none/activity/audit/full，推荐audit
    history-level: audit

    # Job执行器（异步任务、定时器等）
    job-execution:
      enabled: true
      core-pool-size: 3
      max-pool-size: 10

