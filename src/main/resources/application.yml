# 服务器配置
server:
  # HTTP 监听端口
  port: 8080
  # Servlet 相关配置
  servlet:
    # 应用上下文路径
    context-path: /

# Spring Boot 核心配置
spring:
  # 应用元信息
  application:
    # 应用名称（用于注册、日志等）
    name: demo

  # Profile 环境配置
  profiles:
    # 当前启用的环境名称
    active: default

  # 控制台输出配置
  output:
    # ANSI 颜色输出配置
    ansi:
      # 是否启用 ANSI 颜色
      enabled: always

  # Servlet 容器配置
  servlet:
    # 文件上传配置
    multipart:
      # 单文件最大大小
      max-file-size: 120MB
      # 单请求最大大小
      max-request-size: 120MB

  # Redis 连接配置
  redis:
    # Redis 主机地址
    host: localhost
    # Redis 端口
    port: 6379

  # 数据源配置
  datasource:
    # Druid 连接池通用配置
    druid:
      # Druid 监控页面配置
      stat-view-servlet:
        # 是否启用监控页面
        enabled: true
        # 监控页面 URL 匹配
        url-pattern: /druid/*
        # 监控页面登录用户名
        login-username: admin
        # 监控页面登录密码
        login-password: admin
      # Web 统计过滤器配置
      web-stat-filter:
        # 是否启用 Web 统计
        enabled: true
        # Web 统计过滤 URL 匹配
        url-pattern: /*
        # 过滤器排除资源
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
    # 动态数据源配置
    dynamic:
      # 动态数据源下 Druid 配置
      druid:
        # Wall 防火墙配置
        wall:
          # 因为camunda框架的sql有where 1=1
          # 是否拦截 where 条件恒真
          select-where-alway-true-check: false
          # 是否允许 AND 条件恒真
          condition-and-alway-true-allow: true
      # 默认数据源名称
      primary: master
      # 严格匹配模式（true: 未匹配直接报错）
      strict: false
      # 数据源集合
      datasource:
        # 主库配置
        master:
          # JDBC 连接地址
          url: jdbc:postgresql://localhost:5432/test?currentSchema=test
          # 数据库用户名
          username: panpan
          # 数据库密码
          password: 1
          # JDBC 驱动类
          driver-class-name: org.postgresql.Driver
          # 连接池实现类
          type: com.alibaba.druid.pool.DruidDataSource
          # Druid 连接池细项
          druid:
            # 初始化连接数
            initial-size: 1
            # 最小空闲连接数
            min-idle: 1
            # 最大活跃连接数
            max-active: 3
            # 获取连接最大等待时间（ms）
            max-wait: 60000
            # 连接检测间隔（ms）
            time-between-eviction-runs-millis: 60000
            # 连接最小空闲时间（ms）
            min-evictable-idle-time-millis: 300000
            # 连接校验 SQL
            validation-query: SELECT 1
            # 空闲时检测连接
            test-while-idle: true
            # 获取连接时检测
            test-on-borrow: false
            # 归还连接时检测
            test-on-return: false
            # 是否缓存预编译语句
            pool-prepared-statements: true
            # 每连接最大缓存 PS 数
            max-pool-prepared-statement-per-connection-size: 20
            # 启用过滤器
            filters: stat,wall,slf4j
            # 连接属性
            connection-properties: >
              druid.stat.mergeSql=true;
              druid.stat.slowSqlMillis=5000;
              wall.config.multiStatementAllow=true;
              wall.config.noneBaseStatementAllow=true;
              removeAbandoned=true;
              removeAbandonedTimeout=180;
              logAbandoned=false;
              keepAlive=true;
              maxEvictableIdleTimeMillis=900000
