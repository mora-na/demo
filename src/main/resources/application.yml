# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # MyBatis 原生配置
  configuration:
    # 是否启用懒加载
    lazy-loading-enabled: true
    # 是否启用激进懒加载
    aggressive-lazy-loading: false
    # SQL 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Excel 导出性能配置
excel:
  # Excel 导出配置
  export:
    # 分页导出每页大小
    page-size: 1000
    # SXSSF 内存窗口行数
    row-window-size: 200
    # 是否启用共享字符串表
    use-shared-strings: false
    # 是否启用列宽自动计算
    auto-size: false
    # 自动列宽允许的最大行数
    auto-size-max-rows: 2000
    # 分页时是否执行 count 查询
    count-enabled: false
    # 是否压缩临时文件
    compress-temp-files: true

# Camunda 流程引擎配置
camunda:
  # 是否启用Camunda，关闭后不加载Camunda框架
  enabled: false
  # Camunda BPM 配置
  bpm:
    # 是否启用 BPM 引擎
    enabled: ${camunda.enabled:true}
    # Webapp 配置
    webapp:
      # 是否启用 Camunda Webapp
      enabled: ${camunda.enabled:true}
    # REST 接口配置
    rest:
      # 是否启用 Camunda REST
      enabled: ${camunda.enabled:true}
    # 管理后台登录账号
    admin-user:
      # 管理员账号
      id: admin
      # 管理员密码
      password: admin
      # 管理员名称
      first-name: Admin

    # 自动部署resources/bpmn下的流程文件
    auto-deployment-enabled: true

    # 数据库表结构策略
    # true: 自动创建表（开发环境）
    # false: 不自动创建（生产环境，用SQL脚本初始化）
    database:
      # 是否自动更新表结构
      schema-update: true
    #      type: mysql

    # 历史数据记录级别
    # none/activity/audit/full，推荐audit
    history-level: audit

    # Job执行器（异步任务、定时器等）
    job-execution:
      # 是否启用 Job 执行器
      enabled: true
      # 核心线程数
      core-pool-size: 3
      # 最大线程数
      max-pool-size: 10

# 日志配置
logging:
  # 日志文件配置
  file:
    # 日志文件路径
    name: logs/demo.log
  # 日志编码配置
  charset:
    # 控制台编码
    console: UTF-8
    # 文件编码
    file: UTF-8
  # 日志格式配置
  pattern:
    # 控制台日志格式
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
    # 文件日志格式
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
  # 日志级别配置
  level:
    # 根日志级别
    root: info
    # 业务包日志级别
    com: debug
    # 兼容包日志级别
    cn.com: debug
    # Spring 核心日志级别
    org.springframework: warn
    # Spring Web 日志级别
    org.springframework.web: warn
  # Logback 滚动策略
  logback:
    # 滚动策略配置
    rollingpolicy:
      # 日志文件命名模式
      file-name-pattern: 'logs/demo.log%d{yyyy-MM-dd}.log'
      # 保留历史天数
      max-history: 30
      # 日志总大小上限
      total-size-cap: 1GB

# 用户自定义配置
user:
  # 用户配置集合
  config:
    # 示例姓名
    name: zhangsan
    # 示例年龄
    age: 18
    # 示例角色列表
    roles:
      - admin # 角色：admin
      - user  # 角色：user
    # 示例扩展配置
    settings:
      # 主题配置
      theme: dark
      # 通知开关
      notify: true

# 认证配置
auth:
  # JWT 配置
  jwt:
    # JWT 密钥
    secret: 0x0daw00$0001,06a7c00@00x0NSwHSw0=0*00&010(784c000,0x00+0nUED3n0-001)0ea7c0+00
    # Token 有效期（秒）
    ttl-seconds: 7200
  # 验证码配置
  captcha:
    # 图片宽度
    width: 120
    # 图片高度
    height: 40
    # 验证码长度
    code-length: 4
    # 干扰线宽度
    thickness: 2
    # 验证码有效期（秒）
    expire-seconds: 120
  # 密码策略配置
  password:
    # 密码处理模式
    mode: bcrypt
    # 密码盐
    salt: "4a97HT87*7&s649c-49f3-./9nTsdn^5$1becc50a*7!4e4"
    # 默认密码（支持使用环境变量覆盖）
    default-password: ${AUTH_DEFAULT_PASSWORD:ChangeMe123!}
    # 登录密码传输模式：plain/base64/aes-gcm
    transport-mode: aes-gcm
    # AES-GCM Base64 密钥（建议使用环境变量覆盖）
    transport-key: ${AUTH_PASSWORD_TRANSPORT_KEY:}
    # 强密码校验开关
    strong-check-enabled: true
    # 强密码最小长度（pattern为空时生效）
    strong-min-length: 8
    # 强密码校验正则（为空则使用默认组合校验）
    strong-pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\\\d)(?=.*[^A-Za-z\\\\d]).{8,}$"
  # 认证过滤器配置
  filter:
    # 是否启用认证过滤器
    enabled: true
    # 认证过滤排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths:
      - /auth/** # 排除认证接口
      - /error # 排除错误接口

# 安全与权限配置
security:
  # 公共排除路径配置
  common:
    # 公共排除路径列表
    exclude-paths:
      - /druid/** # 排除 Druid 监控
      - /camunda/** # 排除 Camunda Web
      - /engine-rest/** # 排除 Camunda REST
  # XSS 防护配置
  xss:
    # 是否启用 XSS 防护
    enabled: true
    # XSS 额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: []
  # SQL 审计与防护配置
  sql-guard:
    # 是否启用 SQL 防护
    enabled: true
    # 是否阻止全表操作
    block-full-table: true
    # 是否阻止多语句执行
    block-multi-statement: true
  # 频率限制配置
  rate-limit:
    # 是否启用限流
    enabled: true
    # 限流窗口时长（秒）
    window-seconds: 60
    # 窗口内最大请求数
    max-requests: 100
    # 限流 Key 生成方式
    key-mode: ip
    # 限流 Key 是否包含路径
    include-path: true
    # 限流额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: []
  # 重复提交防护配置
  duplicate-submit:
    # 是否启用重复提交防护
    enabled: true
    # 判定时间窗口（ms）
    interval-millis: 3000
    # 重复提交 Key 生成方式
    key-mode: ip
    # 重复提交 Key 是否包含路径
    include-path: true
    # 是否使用幂等键头
    use-idempotency-key: true
    # 幂等键 Header 名称
    header-name: Idempotency-Key
    # 是否包含请求体生成 Key
    include-body: true
    # 保护的 HTTP 方法
    methods:
      - POST # 方法：POST
      - PUT # 方法：PUT
      - PATCH # 方法：PATCH
      - DELETE # 方法：DELETE
    # 重复提交额外排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths: []
  # 权限配置
  permission:
    # 是否启用权限校验
    enabled: true
    # 默认要求登录
    require-login-by-default: true
    # 权限数据源
    source: db
    # 超级用户列表
    super-users:
      - master # 超级用户账号
    # 权限缓存时长（秒）
    cache-seconds: 600
    # 权限校验排除路径（会与 security.common.exclude-paths 合并）
    exclude-paths:
      - /auth/** # 排除认证接口
      - /error # 排除错误接口
  # 数据范围配置
  data-scope:
    # 是否启用数据范围控制
    enabled: true
    # 默认数据范围类型
    default-type: ALL
    # 数据范围来源
    source: db
    # 数据范围缓存时长（秒）
    cache-seconds: 180
