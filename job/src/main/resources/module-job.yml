spring:
  quartz:
    # Quartz 是否自动启动（关闭以便先清理孤儿触发器）
    auto-startup: false
    # 启动延迟（秒，0 表示立即启动）
    startup-delay: 0
    # 是否覆盖已存在的 Job/Trigger（JDBC 模式建议谨慎开启）
    overwrite-existing-jobs: false
    # 关闭应用时是否等待任务执行完成
    wait-for-jobs-to-complete-on-shutdown: false
    # 持久化任务到数据库
    job-store-type: jdbc
    jdbc:
      # 禁止自动建表，使用 SQL 脚本初始化
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            # 调度器名称（需与表中 SCHED_NAME 一致）
            instanceName: DemoQuartzScheduler
            # 节点 ID（AUTO 表示自动生成）
            instanceId: AUTO
            # 禁用版本更新检查
            skipUpdateCheck: true
          threadPool:
            # 线程池实现类
            class: org.quartz.simpl.SimpleThreadPool
            # 线程数（按并发任务量配置）
            threadCount: 4
            # 线程优先级（1-10）
            threadPriority: 5
            # 继承初始化线程的上下文类加载器
            threadsInheritContextClassLoaderOfInitializingThread: true
          jobStore:
            # 使用 Spring 托管的数据源（默认 DataSource）
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            # JDBC 方言委托类
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            # 表前缀（需与建表脚本保持一致）
            tablePrefix: demo_job.sys_quartz_
            # Misfire 判定阈值（毫秒）
            misfireThreshold: 60000
            # 单次处理的 misfire 数量上限
            maxMisfiresToHandleAtATime: 20
            # 是否启用集群
            isClustered: false
            # 集群心跳间隔（毫秒，开启集群时生效）
            clusterCheckinInterval: 20000
            # JobDataMap 是否仅支持字符串属性
            useProperties: false
            # 获取触发器时加锁（高并发 DB 建议开启）
            acquireTriggersWithinLock: true

# 定时任务日志收集配置
job:
  constants:
    log-collect:
      # 是否启用自动收集
      enabled: true
      # 收集范围：MDC | THREAD
      scope: MDC
      # 默认日志收集级别（任务未指定时使用）：TRACE/DEBUG/INFO/WARN/ERROR
      min-level: INFO
      # 单次执行最大日志长度（字符）
      max-length: 8192
      # 最大缓冲实例数量
      max-buffers: 200
      # 是否启用自动降级
      auto-degrade-enabled: true
      # 缓冲占用降级阈值比例（0-1）
      degrade-buffer-ratio: 0.9
      # 延迟合并时间（毫秒）
      merge-delay-millis: 3000
      # 最大缓冲保留时间（毫秒）
      max-hold-millis: 30000
      # 是否启用 InheritableThreadLocal 兜底透传
      inherit-thread-context: true
      # MDC 关联键
      mdc-key: jobLogId
      # 线程名 MDC 键（scope=THREAD 生效）
      thread-key: jobLogThread
    execution:
      # sys_job_log.log_detail 字段最大长度
      log-detail-max-length: 8000
    appender:
      # Job 日志收集输出格式（logback pattern）
      pattern: '%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %X{traceId} [%thread] %logger{36} - %msg%ex'
