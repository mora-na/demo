# 认证配置
auth:
  # JWT 配置
  jwt:
    # 是否允许通过 query 参数携带 token
    allow-query-token: false
  # 验证码配置
  captcha:
    # 图片宽度
    width: 120
    # 图片高度
    height: 40
    # 干扰线宽度
    thickness: 4
    # 旋转范围（弧度）
    rotate-min: -0.75
    rotate-max: 0.75
    # 斜切范围（X/Y）
    shear-x-min: -0.75
    shear-x-max: 0.75
    shear-y-min: -0.75
    shear-y-max: 0.75
