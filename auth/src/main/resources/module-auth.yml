# 认证配置
auth:
  # JWT 配置
  jwt:
    # 是否允许通过 query 参数携带 token
    allow-query-token: false
    # JWT Cookie 配置（SSE/下载等无法设置 Header 的场景）
    cookie:
      # 是否启用 JWT Cookie
      enabled: false
      # Cookie 名称
      name: AUTH_TOKEN
      # Cookie Path
      path: /
      # Cookie Domain（为空则不设置）
      domain: ""
      # 是否 HttpOnly
      http-only: true
      # 是否 Secure（HTTPS 建议开启）
      secure: false
      # SameSite 策略：Lax / Strict / None
      same-site: Lax
      # Max-Age（秒）：<0 使用 JWT TTL；=0 会话 Cookie；>0 自定义
      max-age-seconds: -1
  # 验证码配置
  captcha:
    # 图片宽度
    width: 120
    # 图片高度
    height: 40
    # 干扰线宽度
    thickness: 4
    # 旋转范围（弧度）
    rotate-min: -0.75
    rotate-max: 0.75
    # 斜切范围（X/Y）
    shear-x-min: -0.75
    shear-x-max: 0.75
    shear-y-min: -0.75
    shear-y-max: 0.75
