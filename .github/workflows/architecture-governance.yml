name: Architecture Governance

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Enforce module dependency boundaries
        run: ./mvnw -B -pl system,auth,order,notice,job,log,identity-api,log-api -am validate

      - name: Run ArchUnit boundary tests
        run: ./mvnw -B -pl app -am test -Dtest=ArchitectureGovernanceTest -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false
