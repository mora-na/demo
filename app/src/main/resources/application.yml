# Jasypt 配置：指定配置加解密器，支持 ENC(...) 形式的密文属性
jasypt:
  encryptor:
    # StringEncryptor Bean 名称（需与 @Component(name=...) 一致）
    bean: jasyptStringEncryptor
    # 加解密口令（建议用环境变量覆盖）
    password: ${JASYPT_ENCRYPTOR_PASSWORD:encryptorPassword}

# 服务器配置
server:
  # Servlet 相关配置
  servlet:
    # 应用上下文路径
    context-path: /
  # 是否以多节点集群模式运行。
  # false: 不强制覆盖任何配置，用户显式配置保持原样（默认）。
  # true : 启用 server.clustered-cover-config 中定义的强制覆盖，用于一键切换到多节点部署安全配置。
  is-clustered: true
  # 多节点模式下的强制覆盖配置表。
  # 仅当 server.is-clustered=true 时生效，且会以最高优先级覆盖已有配置。
  # 使用点号 key 形式（如 spring.quartz.properties.org.quartz.jobStore.isClustered）。
  # 可扩展任意配置键与类型（布尔 / 数字 / 字符串 / 列表等），避免在代码中硬编码覆盖项。
  # 常见用途：开启 Quartz 集群、切换缓存到 Redis、启用跨节点配置变更同步等。
  clustered-cover-config:
    # Quartz 必须使用持久化存储，避免多节点内存调度不一致。
    spring.quartz.job-store-type: jdbc
    # Quartz 集群开关，多节点部署必须开启。
    spring.quartz.properties.org.quartz.jobStore.isClustered: true
    # Quartz 节点 ID 自动生成，避免多节点实例 ID 冲突。
    spring.quartz.properties.org.quartz.scheduler.instanceId: AUTO
    # Quartz 调度器名称需要在所有节点保持一致。
    spring.quartz.properties.org.quartz.scheduler.instanceName: DemoQuartzScheduler
    # 多节点需要共享缓存（如 Redis 或 DB），避免内存缓存导致节点间状态不一致。
    cache.location: redis
    # 启用跨节点配置变更同步，确保动态配置在多节点一致生效。
    config.change-sync.enabled: true

# Spring Boot 核心配置
spring:
  config:
    import:
      - optional:classpath:module-datasource-routing.yml
      - optional:classpath:module-job.yml
      - optional:classpath:module-cache.yml
      - optional:classpath:module-dict.yml
      - optional:classpath:module-notice.yml
      - optional:classpath:module-mybatis.yml
      - optional:classpath:module-excel.yml
      - optional:classpath:module-security.yml
      - optional:classpath:module-auth.yml
      - optional:classpath:module-dynamic-api.yml
      - optional:classpath:module-config.yml

  # 应用元信息
  application:
    # 应用名称（用于注册、日志等）
    name: demo

  # 关闭 Druid 官方监控页面（统一由自定义监控页展示）
  datasource:
    druid:
      stat-view-servlet:
        enabled: false

  # 默认使用 dev 配置，可通过环境变量覆盖
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 控制台输出配置
  output:
    # ANSI 颜色输出配置
    ansi:
      # 是否启用 ANSI 颜色
      enabled: always

  # Servlet 容器配置
  servlet:
    # 文件上传配置
    multipart:
      # 单文件最大大小
      max-file-size: 120MB
      # 单请求最大大小
      max-request-size: 120MB

# Actuator 健康检查配置
# 生产环境Actuator配置 - 严格安全限制
management:
  server:
    port: 9090  # 独立端口，仅内网运维网段可访问
  endpoints:
    web:
      exposure:
        include: health,metrics,loggers  # 仅暴露运维必需的端点
        exclude: env,beans,threaddump,heapdump,shutdown  # 禁用高风险端点
  endpoint:
    shutdown:
      enabled: false  # 强制禁用关闭应用的端点
    health:
      show-details: when_authorized  # 仅授权用户能看到健康检查详情
      probes:
        enabled: true  # 启用K8s/容器平台的健康探针
    loggers:
      enabled: true  # 仅保留动态调整日志级别的能力
    metrics:
      enabled: true  # 保留指标监控能力
  health:
    # 生产环境按需开启组件健康探测，避免无意义的探测告警
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:${NOTIFY_MAIL_ENABLED:false}}
    db:
      enabled: true  # 数据库是核心依赖，必须探测
    redis:
      enabled: true  # 如有Redis依赖则开启
    diskSpace:
      enabled: true  # 磁盘空间探测（防止磁盘满）
  metrics:
    tags:
      application: ${spring.application.name}  # 指标添加应用名标签（方便监控平台识别）
