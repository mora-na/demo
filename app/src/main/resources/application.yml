# Jasypt 配置：指定配置加解密器，支持 ENC(...) 形式的密文属性
jasypt:
  encryptor:
    # StringEncryptor Bean 名称（需与 @Component(name=...) 一致）
    bean: jasyptStringEncryptor
    # 加解密口令（建议用环境变量覆盖）
    password: ${JASYPT_ENCRYPTOR_PASSWORD:encryptorPassword}

# 服务器配置
server:
  # Servlet 相关配置
  servlet:
    # 应用上下文路径
    context-path: /

# Spring Boot 核心配置
spring:
  config:
    import:
      - optional:classpath:module-datasource-routing.yml
      - optional:classpath:module-job.yml
      - optional:classpath:module-cache.yml
      - optional:classpath:module-dict.yml
      - optional:classpath:module-notice.yml
      - optional:classpath:module-mybatis.yml
      - optional:classpath:module-excel.yml
      - optional:classpath:module-security.yml
      - optional:classpath:module-auth.yml
      - optional:classpath:module-dynamic-api.yml

  # 应用元信息
  application:
    # 应用名称（用于注册、日志等）
    name: demo

  # 关闭 Druid 官方监控页面（统一由自定义监控页展示）
  datasource:
    druid:
      stat-view-servlet:
        enabled: false

  # 默认使用 dev 配置，可通过环境变量覆盖
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 控制台输出配置
  output:
    # ANSI 颜色输出配置
    ansi:
      # 是否启用 ANSI 颜色
      enabled: always

  # Servlet 容器配置
  servlet:
    # 文件上传配置
    multipart:
      # 单文件最大大小
      max-file-size: 120MB
      # 单请求最大大小
      max-request-size: 120MB

# Actuator 健康检查配置
management:
  health:
    mail:
      # 默认跟随 NOTIFY_MAIL_ENABLED，未启用邮件时不探测 SMTP，避免无密码告警
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:${NOTIFY_MAIL_ENABLED:false}}

# 日志配置
logging:
  # 日志编码配置
  charset:
    # 控制台编码
    console: UTF-8
    # 文件编码
    file: UTF-8
  # 日志格式配置
  pattern:
    # 控制台日志格式
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
    # 文件日志格式
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %X{traceId} %cyan([%thread]) %magenta(%logger{36} - %msg%n)'
  # Logback 滚动策略
  logback:
    # 滚动策略配置
    rollingpolicy:
      # 日志文件命名模式
      file-name-pattern: 'logs/${spring.application.name}%d{yyyy-MM-dd}.log'
      # 保留历史天数
      max-history: 30
      # 日志总大小上限
      total-size-cap: 1GB
