# 开发环境可定制配置
server:
  # HTTP 监听端口
  port: 8080
  # 是否以多节点集群模式运行。
  # false: 不强制覆盖任何配置，用户显式配置保持原样（默认）。
  # true : 启用 server.clustered-cover-config 中定义的强制覆盖，用于一键切换到多节点部署安全配置。
  is-clustered: false
  # 多节点模式下的强制覆盖配置表。
  # 仅当 server.is-clustered=true 时生效，且会以最高优先级覆盖已有配置。
  # 使用点号 key 形式（如 spring.quartz.properties.org.quartz.jobStore.isClustered）。
  # 可扩展任意配置键与类型（布尔 / 数字 / 字符串 / 列表等），避免在代码中硬编码覆盖项。
  # 常见用途：开启 Quartz 集群、切换缓存到 Redis、启用跨节点配置变更同步等。
  clustered-cover-config:
    # Quartz 必须使用持久化存储，避免多节点内存调度不一致。
    spring.quartz.job-store-type: jdbc
    # Quartz 集群开关，多节点部署必须开启。
    spring.quartz.properties.org.quartz.jobStore.isClustered: true
    # Quartz 节点 ID 自动生成，避免多节点实例 ID 冲突。
    spring.quartz.properties.org.quartz.scheduler.instanceId: AUTO
    # Quartz 调度器名称需要在所有节点保持一致。
    spring.quartz.properties.org.quartz.scheduler.instanceName: DemoQuartzScheduler
    # 多节点需要共享缓存（如 Redis 或 DB），避免内存缓存导致节点间状态不一致。
    cache.location: redis
    # 启用跨节点配置变更同步，确保动态配置在多节点一致生效。
    config.change-sync.enabled: true
# 缓存配置
cache:
  # 缓存位置：redis | memory（仅限单机部署） | db
  location: memory
security:
  # CORS 配置
  cors:
    # 是否启用 CORS
    enabled: true
    # 允许的来源域名
    #可以指定环境变量覆盖，例如：SECURITY_CORS_ALLOWED_ORIGINS=https://demo.morana.dns.army,https://demo-api.mora.dpdns.org
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - https://demo.morana.dns.army
#job:
#  async-log:
#    coverage:
#      mode: baseline
#       mode: branches
#       branch-wait-timeout-seconds: 1

# 配置种子开关（仅对显式标记 seed=true 的字段生效）
config:
  seed:
    # 是否启用配置种子（关闭可加速启动）
    enabled: true
  # 配置缓存预热范围
  prewarm:
    # 是否启用配置缓存预热
    enabled: false
    # 预热范围：ALL / SEEDED / HOT / SEEDED_OR_HOT / NONE
    mode: NONE
  change-sync:
    # 单节点测试环境关闭跨节点配置同步，减少轮询线程和缓存访问
    enabled: false
  # 配置模块常量覆盖
  constants:
    cache:
      # 负缓存 TTL（秒）
      miss-ttl-seconds: 30

# SQL 日志配置
sql-log:
  # 是否打印 SQL
  enabled: false

# 认证配置
auth:
  # JWT 配置
  jwt:
    # JWT 密钥
    # 建议通过环境变量 AUTH_JWT_SECRET 覆盖；默认值仅用于本地开发
    secret: ${AUTH_JWT_SECRET:dev-please-change-this-secret-32chars}
    # 允许通过 query 参数传递 token（SSE/下载等无法设置 Header 的场景）
    allow-query-token: false
    # Token 有效期（秒）
    ttl-seconds: 7200
  # 验证码配置
  captcha:
    # 验证码长度
    code-length: 4
    # 内置字体资源（可配置多个以混用）
    font-resources:
      # 字体示例: DejaVuSans.ttf、OpenSans-Bold.ttf
      - classpath:front/DejaVuSans.ttf
      - classpath:front/OpenSans-Bold.ttf
    # 验证码有效期（秒）
    expire-seconds: 120
  # 密码策略配置
  password:
    # 用户密码加密持久化处理模式：bcrypt/sm3
    mode: sm3
    # 密码盐（用于 sm3）
    salt: "4a97HT87*7&s649c-49f3-./9nTsdn^5$1becc50a*7!4e4"
    # 默认密码（支持使用环境变量覆盖）
    default-password: ${AUTH_DEFAULT_PASSWORD:ENC(hf7z4h+P3Ranjc8Ana8ZQg==)}
    # 登录密码传输模式(前后端接口)：plain/base64/aes-gcm/sm2
    transport-mode: sm2
    # AES-GCM Base64 密钥（建议使用环境变量覆盖）
    transport-key: ${AUTH_PASSWORD_TRANSPORT_KEY:ENC(hf7z4h+P3Ranjc8Ana8ZQg==)}
    # SM2 私钥（Base64 PKCS8，transport-mode=sm2）
    transport-sm2-private-key: ${AUTH_PASSWORD_TRANSPORT_SM2_PRIVATE_KEY:MIGHAgEAMBMGByqGSM49AgEGCCqBHM9VAYItBG0wawIBAQQgEhmrsLBHrOHhxkRBmLM864SidDpb904x/YNHRfuuxl2hRANCAAQENOaxpHWlFIVreHZMxLEvoKp9js5DOIMpIXQis6YOxzZJoaPd3XIqZaqjmnIa0+kUkFqVgthwFEKGxPjG8FpA}
    # SM2 公钥（Base64 X.509，提供前端加密使用）
    transport-sm2-public-key: ${AUTH_PASSWORD_TRANSPORT_SM2_PUBLIC_KEY:MFkwEwYHKoZIzj0CAQYIKoEcz1UBgi0DQgAEBDTmsaR1pRSFa3h2TMSxL6CqfY7OQziDKSF0IrOmDsc2SaGj3d1yKmWqo5pyGtPpFJBalYLYcBRChsT4xvBaQA==}
    # 强密码校验开关
    strong-check-enabled: true
    # 强密码最小长度（pattern为空时生效）
    strong-min-length: 8
    # 强密码校验正则（为空则使用默认组合校验）
    strong-pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z\\d]).{8,}$"
    # 首次登录是否强制修改密码
    force-change-on-first-login: true
    # 密码过期天数（<=0 表示不启用过期策略）
    expire-days: 120
  # 登录失败限制配置
  login-limit:
    # 是否启用登录失败限制
    enabled: true
    # 允许的最大错误次数
    max-errors: 5
    # 失败统计窗口时长（秒）
    window-seconds: 120
    # 锁定时长（秒）
    lock-seconds: 180
    # Key 维度：user/ip/ip-user
    key-mode: ip-user
  # 认证过滤器配置
  filter:
    # 是否启用认证过滤器
    enabled: true
    # 认证过滤排除路径（AuthTokenFilter 生效，未登录也可访问）
    # 该列表会与 security.common.exclude-paths 合并
    exclude-paths:
      - /auth/captcha # 排除验证码接口
      - /auth/login # 排除登录接口
      - /error # 排除错误接口
      - /actuator/** # 测试环境放开
  # 安全增强配置
  security:
    # 登录异常告警配置
    login-anomaly:
      # 是否启用异地/设备变更告警邮件
      enabled: true
      # 是否在 IP 变化时告警
      notify-on-ip-change: true
      # 是否在设备变化时告警
      notify-on-device-change: true
      # 告警邮件主题（不含 notify.mail.subject-prefix）
      mail-subject: 登录安全提醒
    # 敏感操作邮箱二次确认配置
    operation-confirm:
      # 是否启用二次确认
      enabled: true
      # 验证码长度（系统会限制在 4~10）
      code-length: 6
      # 验证码有效期（秒）
      code-ttl-seconds: 300
      # 发码冷却时间（秒）
      resend-interval-seconds: 60
      # 单验证码最大校验失败次数
      max-verify-attempts: 5
      # 校验通过后的票据有效期（秒）
      ticket-ttl-seconds: 900
      # 二次确认邮件主题（不含 notify.mail.subject-prefix）
      mail-subject: 敏感操作确认验证码

# 开发环境Actuator配置 - 白名单暴露（避免第三方ControllerEndpoint兼容性问题）
management:
  server:
    port: 9090  # 也可改为8080（和业务端口共用），dev环境无需隔离
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,logcollect,env,beans,threaddump,heapdump,shutdown
  endpoint:
    shutdown:
      enabled: true  # dev环境可启用关闭功能（方便调试）
    health:
      show-details: always  # 始终显示健康检查的完整详情
      probes:
        enabled: true  # 启用健康探针（通用配置，dev也可开启）
    heapdump:
      enabled: true  # 启用堆转储（dev排查内存问题）
    threaddump:
      enabled: true  # 启用线程快照（dev排查线程问题）
  health:
    # dev环境可探测所有组件（包括邮件、数据库等），方便排查依赖问题
    mail:
      enabled: false
    db:
      enabled: true
    redis:
      enabled: false

# 通知能力配置
notify:
  mail:
    # 是否启用 SMTP 邮件发送能力
    enabled: ${NOTIFY_MAIL_ENABLED:false}
    # 发件人地址；为空时回退到 spring.mail.username
    from: ${NOTIFY_MAIL_FROM:}
    # 邮件主题前缀（会自动拼接到业务主题前）
    subject-prefix: ${NOTIFY_MAIL_SUBJECT_PREFIX:[Demo]}

# 数据源模式配置
app:
  datasource:
    # 三种模式：1)占用内存比较多 500MB+,推荐2),100MB+
    # 1) multi-datasource
    # 2) single-datasource-multi-schema
    # 3) single-datasource-single-schema
    mode: ${APP_DATASOURCE_MODE:single-datasource-multi-schema}
    # 单 schema 模式下目标 schema 名称（mode=single-datasource-single-schema）
    single-schema-name: ${APP_DATASOURCE_SINGLE_SCHEMA_NAME:demo}

# 数据源与缓存配置
spring:
  data:
    redis:
      repositories:
        # 禁用 Spring Data Redis Repository 扫描（项目当前未使用 Repository 模式）
        enabled: false

  task:
    execution:
      pool:
        # 异步任务线程池核心线程数
        core-size: 2
        # 异步任务线程池最大线程数
        max-size: 4
        # 异步任务队列容量
        queue-capacity: 50
        # 线程保活时间（秒）
        keep-alive: 60s
      # 线程名前缀
      thread-name-prefix: async-

  # SMTP 邮件配置（Spring Boot 标准）
  mail:
    # SMTP 主机地址
    host: ${SPRING_MAIL_HOST:}
    # SMTP 端口
    port: ${SPRING_MAIL_PORT:587}
    # SMTP 用户名
    username: ${SPRING_MAIL_USERNAME:}
    # SMTP 密码/授权码
    password: ${SPRING_MAIL_PASSWORD:}
    # 编码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 认证
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          # 是否启用 STARTTLS
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}
          # 是否启用 SSL（和 STARTTLS 二选一）
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL:false}
          # 连接超时（毫秒）
          connectiontimeout: ${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
          # 读超时（毫秒）
          timeout: ${SPRING_MAIL_TIMEOUT:5000}
          # 写超时（毫秒）
          writetimeout: ${SPRING_MAIL_WRITE_TIMEOUT:5000}

  # Redis 连接配置
  redis:
    # Redis 主机地址
    host: localhost
    # Redis 端口
    port: 6379

  # 数据源配置
  datasource:
    # 单数据源连接（两种单数据源模式都使用该连接）
    url: ${DB_SINGLE_URL:${DB_URL:jdbc:postgresql://localhost:5432/demo}}
    username: ${DB_SINGLE_USER:${DB_SYSTEM_RW_USER:demo_system_rw}}
    password: ${DB_SINGLE_PASSWORD:${DB_SYSTEM_RW_PASSWORD:demo_system_rw}}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid 连接池通用配置
    druid:
      # 初始化连接数
      initial-size: 1
      # 最小空闲连接数
      min-idle: 1
      # 最大活跃连接数
      max-active: 6
      # 获取连接最大等待时间（ms）
      max-wait: 30000
      # 连接检测间隔（ms）
      time-between-eviction-runs-millis: 60000
      # 连接最小空闲时间（ms）
      min-evictable-idle-time-millis: 300000
      # 最大空闲时长（ms）
      max-evictable-idle-time-millis: 900000
      # 连接校验 SQL
      validation-query: SELECT 1
      # 空闲时检测连接
      test-while-idle: true
      # 获取连接时检测
      test-on-borrow: false
      # 归还连接时检测
      test-on-return: false
      # 保活检测
      keep-alive: true
      # 小规格测试机上关闭 PS 缓存，减少每连接额外内存
      pool-prepared-statements: false
      # 开启连接泄漏检测
      removeAbandoned: true
      # Druid 监控页面配置
      stat-view-servlet:
        # 是否启用监控页面
        enabled: false
        # 监控页面 URL 匹配
        url-pattern: /druid/*
        # 监控页面登录用户名 admin
        login-username: ENC(hf7z4h+P3Ranjc8Ana8ZQg==)
        # 监控页面登录密码 admin
        login-password: ENC(hf7z4h+P3Ranjc8Ana8ZQg==)
      # Web 统计过滤器配置
      web-stat-filter:
        # 是否启用 Web 统计
        enabled: false
        # Web 统计过滤 URL 匹配
        url-pattern: /*
        # 启用 Session 监控（需要应用实际创建 HttpSession）
        session-stat-enable: true
        # 过滤器排除资源
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      # SQL 监控 + 防火墙 + 日志（单数据源模式也启用）
      filters: stat,wall
      filter:
        # SQL 统计
        stat:
          enabled: true
          merge-sql: true
          slow-sql-millis: 5000
        # SQL 防火墙
        wall:
          enabled: true
          config:
            # 是否拦截 where 条件恒真（如 WHERE 1=1）
            select-where-alway-true-check: true
            # 是否允许 AND 条件恒真（如 AND 1=1）
            condition-and-alway-true-allow: false
            # 是否检查 DELETE 语句必须带 WHERE 条件
            delete-where-none-check: true
            # 是否检查 UPDATE 语句必须带 WHERE 条件
            update-where-none-check: true
            # 是否允许多语句执行
            multi-statement-allow: true
            # 是否允许非基本语句
            none-base-statement-allow: true
        # 日志输出
        slf4j:
          enabled: false
      # Spring 监控（按需调整包路径）
      aop-patterns: com.example.demo.*.service.*
    # 动态数据源配置
    dynamic:
      # 总开关由 app.datasource.mode 自动派生（本值会被运行时覆盖）
      # 动态数据源下 Druid 配置
      druid:
        # Wall 防火墙配置
        wall:
          # 是否拦截 where 条件恒真（如 WHERE 1=1）
          select-where-alway-true-check: true
          # 是否允许 AND 条件恒真（如 AND 1=1）
          condition-and-alway-true-allow: false
          # 是否检查 DELETE 语句必须带 WHERE 条件
          delete-where-none-check: true
          # 是否检查 UPDATE 语句必须带 WHERE 条件
          update-where-none-check: true
        # 初始化连接数
        initial-size: 1
        # 最小空闲连接数
        min-idle: 1
        # 最大活跃连接数
        max-active: 4
        # 获取连接最大等待时间（ms）
        max-wait: 30000
        # 连接检测间隔（ms）
        time-between-eviction-runs-millis: 60000
        # 连接最小空闲时间（ms）
        min-evictable-idle-time-millis: 300000
        # 连接校验 SQL
        validation-query: SELECT 1
        # 空闲时检测连接
        test-while-idle: true
        # 获取连接时检测
        test-on-borrow: false
        # 归还连接时检测
        test-on-return: false
        # 是否缓存预编译语句
        pool-prepared-statements: false
        # 每连接最大缓存 PS 数
        max-pool-prepared-statement-per-connection-size: 20
        # 启用过滤器
        filters: stat,wall
        # 是否回收泄漏连接 建议：开发/联调环境：可以保留，便于发现连接泄漏。生产环境：关闭
        remove-abandoned: true
        # 泄漏连接回收超时（毫秒）
        remove-abandoned-timeout-millis: 120000
        # 是否记录泄漏连接日志
        log-abandoned: false
        # 保活检测
        keep-alive: true
        # 最大空闲时长（毫秒）
        max-evictable-idle-time-millis: 900000
        # 连接属性
        connection-properties:
          # 是否将相同结构但参数不同的 SQL 合并统计（用于 SQL 监控统计分析）
          # true 表示将参数不同的 SQL 视为同一条 SQL 进行归并
          druid.stat.mergeSql: true
          # 慢 SQL 判定时间（单位：毫秒）
          # 超过 5000ms（5 秒）的 SQL 会被标记为慢 SQL 并记录
          druid.stat.slowSqlMillis: 5000
          # 是否允许一次执行多条 SQL（多语句执行）
          # true 表示允许，例如：select 1; select 2;
          # 开启后需注意 SQL 注入风险
          wall.config.multiStatementAllow: true
          # 是否允许执行非基础语句
          # 基础语句通常是 SELECT、INSERT、UPDATE、DELETE 等
          # true 表示允许执行如 DDL（建表、删表等）或其他特殊语句
          wall.config.noneBaseStatementAllow: true
      # 默认数据源名称
      primary: system_rw
      # 严格匹配模式（true: 未匹配直接报错）
      strict: true
      # 数据源集合
      datasource:
        system_rw:
          # JDBC 连接地址
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          # 数据库用户名
          username: ${DB_SYSTEM_RW_USER:demo_system_rw}
          # 数据库密码
          password: ${DB_SYSTEM_RW_PASSWORD:demo_system_rw}
          # JDBC 驱动类
          driver-class-name: org.postgresql.Driver
          # 连接池实现类
          type: com.alibaba.druid.pool.DruidDataSource
        system_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_SYSTEM_RO_USER:demo_system_ro}
          password: ${DB_SYSTEM_RO_PASSWORD:demo_system_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        config_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_CONFIG_RW_USER:demo_config_rw}
          password: ${DB_CONFIG_RW_PASSWORD:demo_config_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        config_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_CONFIG_RO_USER:demo_config_ro}
          password: ${DB_CONFIG_RO_PASSWORD:demo_config_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        order_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_ORDER_RW_USER:demo_order_rw}
          password: ${DB_ORDER_RW_PASSWORD:demo_order_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        order_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_ORDER_RO_USER:demo_order_ro}
          password: ${DB_ORDER_RO_PASSWORD:demo_order_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        notice_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_NOTICE_RW_USER:demo_notice_rw}
          password: ${DB_NOTICE_RW_PASSWORD:demo_notice_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        notice_ro:
