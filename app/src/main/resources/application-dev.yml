# 开发环境可定制配置
server:
  # HTTP 监听端口
  port: 8080

# 日志级别配置
logging:
  # 日志文件配置
  file:
    # 日志文件路径
    name: logs/${spring.application.name}.log
  # 日志级别配置
  level:
    # 根日志级别（未命中包名规则时使用）
    root: info
    # 业务包通用级别（覆盖 root，便于开发调试）
    com: debug
    # 兼容历史包名前缀（避免漏日志）
    cn.com: debug
    # Spring 核心日志级别（建议 warn 以减少噪音）
    org.springframework: warn
    # Spring Web 日志级别（请求链路相关）
    org.springframework.web: warn
    # 动态数据源切换日志（如 DynamicRoutingDataSource）
    com.baomidou.dynamic.datasource: info
    # Druid 连接池内部日志（如 PreparedStatementPool）
    com.alibaba.druid: info

# SQL 日志配置
sql-log:
  # 是否打印 SQL
  enabled: false

# 认证配置
auth:
  # JWT 配置
  jwt:
    # JWT 密钥
    # 建议通过环境变量 AUTH_JWT_SECRET 覆盖；默认值仅用于本地开发
    secret: ${AUTH_JWT_SECRET:dev-please-change-this-secret-32chars}
    # 允许通过 query 参数传递 token（SSE/下载等无法设置 Header 的场景）
    allow-query-token: false
    # JWT Cookie 配置（SSE/下载等无法设置 Header 的场景）
    cookie:
      # 是否启用 JWT Cookie
      enabled: true
      # Cookie 名称
      name: AUTH_TOKEN
      # Cookie Path
      path: /
      # 是否 HttpOnly
      http-only: true
      # 是否 Secure（HTTPS 建议开启）
      secure: false
      # SameSite 策略：Lax / Strict / None
      same-site: Strict
      # Max-Age（秒）：<0 使用 JWT TTL；=0 会话 Cookie；>0 自定义
      max-age-seconds: -1
    # Token 有效期（秒）
    ttl-seconds: 7200
  # 验证码配置
  captcha:
    # 验证码长度
    code-length: 4
    # 内置字体资源（可配置多个以混用）
    font-resources:
      # 字体示例: DejaVuSans.ttf、OpenSans-Bold.ttf
      - classpath:front/DejaVuSans.ttf
      - classpath:front/OpenSans-Bold.ttf
    # 验证码有效期（秒）
    expire-seconds: 120
  # 密码策略配置
  password:
    # 用户密码加密持久化处理模式：bcrypt/sm3
    mode: sm3
    # 密码盐（用于 sm3）
    salt: "4a97HT87*7&s649c-49f3-./9nTsdn^5$1becc50a*7!4e4"
    # 默认密码（支持使用环境变量覆盖）
    default-password: ${AUTH_DEFAULT_PASSWORD:ENC(hf7z4h+P3Ranjc8Ana8ZQg==)}
    # 登录密码传输模式(前后端接口)：plain/base64/aes-gcm/sm2
    transport-mode: sm2
    # AES-GCM Base64 密钥（建议使用环境变量覆盖）
    transport-key: ${AUTH_PASSWORD_TRANSPORT_KEY:ENC(hf7z4h+P3Ranjc8Ana8ZQg==)}
    # SM2 私钥（Base64 PKCS8，transport-mode=sm2）
    transport-sm2-private-key: ${AUTH_PASSWORD_TRANSPORT_SM2_PRIVATE_KEY:MIGHAgEAMBMGByqGSM49AgEGCCqBHM9VAYItBG0wawIBAQQgEhmrsLBHrOHhxkRBmLM864SidDpb904x/YNHRfuuxl2hRANCAAQENOaxpHWlFIVreHZMxLEvoKp9js5DOIMpIXQis6YOxzZJoaPd3XIqZaqjmnIa0+kUkFqVgthwFEKGxPjG8FpA}
    # SM2 公钥（Base64 X.509，提供前端加密使用）
    transport-sm2-public-key: ${AUTH_PASSWORD_TRANSPORT_SM2_PUBLIC_KEY:MFkwEwYHKoZIzj0CAQYIKoEcz1UBgi0DQgAEBDTmsaR1pRSFa3h2TMSxL6CqfY7OQziDKSF0IrOmDsc2SaGj3d1yKmWqo5pyGtPpFJBalYLYcBRChsT4xvBaQA==}
    # 强密码校验开关
    strong-check-enabled: true
    # 强密码最小长度（pattern为空时生效）
    strong-min-length: 8
    # 强密码校验正则（为空则使用默认组合校验）
    strong-pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z\\d]).{8,}$"
    # 首次登录是否强制修改密码
    force-change-on-first-login: true
    # 密码过期天数（<=0 表示不启用过期策略）
    expire-days: 120
  # 登录失败限制配置
  login-limit:
    # 是否启用登录失败限制
    enabled: true
    # 允许的最大错误次数
    max-errors: 5
    # 失败统计窗口时长（秒）
    window-seconds: 120
    # 锁定时长（秒）
    lock-seconds: 180
    # Key 维度：user/ip/ip-user
    key-mode: ip-user
  # 认证过滤器配置
  filter:
    # 是否启用认证过滤器
    enabled: true
    # 认证过滤排除路径（AuthTokenFilter 生效，未登录也可访问）
    # 该列表会与 security.common.exclude-paths 合并
    exclude-paths:
      - /auth/captcha # 排除验证码接口
      - /auth/login # 排除登录接口
      - /error # 排除错误接口
  # 安全增强配置
  security:
    # 登录异常告警配置
    login-anomaly:
      # 是否启用异地/设备变更告警邮件
      enabled: true
      # 是否在 IP 变化时告警
      notify-on-ip-change: true
      # 是否在设备变化时告警
      notify-on-device-change: true
      # 告警邮件主题（不含 notify.mail.subject-prefix）
      mail-subject: 登录安全提醒
    # 敏感操作邮箱二次确认配置
    operation-confirm:
      # 是否启用二次确认
      enabled: true
      # 验证码长度（系统会限制在 4~10）
      code-length: 6
      # 验证码有效期（秒）
      code-ttl-seconds: 300
      # 发码冷却时间（秒）
      resend-interval-seconds: 60
      # 单验证码最大校验失败次数
      max-verify-attempts: 5
      # 校验通过后的票据有效期（秒）
      ticket-ttl-seconds: 900
      # 二次确认邮件主题（不含 notify.mail.subject-prefix）
      mail-subject: 敏感操作确认验证码

# 通知能力配置
notify:
  mail:
    # 是否启用 SMTP 邮件发送能力
    enabled: ${NOTIFY_MAIL_ENABLED:false}
    # 发件人地址；为空时回退到 spring.mail.username
    from: ${NOTIFY_MAIL_FROM:}
    # 邮件主题前缀（会自动拼接到业务主题前）
    subject-prefix: ${NOTIFY_MAIL_SUBJECT_PREFIX:[Demo]}

# 数据源模式配置
app:
  datasource:
    # 三种模式：1)占用内存比较多 500MB+,推荐2),100MB+
    # 1) multi-datasource
    # 2) single-datasource-multi-schema
    # 3) single-datasource-single-schema
    mode: ${APP_DATASOURCE_MODE:single-datasource-multi-schema}
    # 单 schema 模式下目标 schema 名称（mode=single-datasource-single-schema）
    single-schema-name: ${APP_DATASOURCE_SINGLE_SCHEMA_NAME:demo}

# 数据源与缓存配置
spring:
  data:
    redis:
      repositories:
        # 禁用 Spring Data Redis Repository 扫描（项目当前未使用 Repository 模式）
        enabled: false

  # SMTP 邮件配置（Spring Boot 标准）
  mail:
    # SMTP 主机地址
    host: ${SPRING_MAIL_HOST:}
    # SMTP 端口
    port: ${SPRING_MAIL_PORT:587}
    # SMTP 用户名
    username: ${SPRING_MAIL_USERNAME:}
    # SMTP 密码/授权码
    password: ${SPRING_MAIL_PASSWORD:}
    # 编码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 认证
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          # 是否启用 STARTTLS
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}
          # 是否启用 SSL（和 STARTTLS 二选一）
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL:false}
          # 连接超时（毫秒）
          connectiontimeout: ${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
          # 读超时（毫秒）
          timeout: ${SPRING_MAIL_TIMEOUT:5000}
          # 写超时（毫秒）
          writetimeout: ${SPRING_MAIL_WRITE_TIMEOUT:5000}

  # Redis 连接配置
  redis:
    # Redis 主机地址
    host: localhost
    # Redis 端口
    port: 6379

  # 数据源配置
  datasource:
    # 单数据源连接（两种单数据源模式都使用该连接）
    url: ${DB_SINGLE_URL:${DB_URL:jdbc:postgresql://localhost:5432/demo}}
    username: ${DB_SINGLE_USER:${DB_SYSTEM_RW_USER:demo_system_rw}}
    password: ${DB_SINGLE_PASSWORD:${DB_SYSTEM_RW_PASSWORD:demo_system_rw}}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid 连接池通用配置
    druid:
      # 开启连接泄漏检测
      removeAbandoned: true
      # Druid 监控页面配置
      stat-view-servlet:
        # 是否启用监控页面
        enabled: true
        # 监控页面 URL 匹配
        url-pattern: /druid/*
        # 监控页面登录用户名 admin
        login-username: ENC(hf7z4h+P3Ranjc8Ana8ZQg==)
        # 监控页面登录密码 admin
        login-password: ENC(hf7z4h+P3Ranjc8Ana8ZQg==)
      # Web 统计过滤器配置
      web-stat-filter:
        # 是否启用 Web 统计
        enabled: true
        # Web 统计过滤 URL 匹配
        url-pattern: /*
        # 过滤器排除资源
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      # SQL 监控 + 防火墙 + 日志（单数据源模式也启用）
      filters: stat,wall,slf4j
      filter:
        # SQL 统计
        stat:
          enabled: true
          merge-sql: true
          slow-sql-millis: 5000
        # SQL 防火墙
        wall:
          enabled: true
          config:
            # 是否拦截 where 条件恒真（如 WHERE 1=1）
            select-where-alway-true-check: true
            # 是否允许 AND 条件恒真（如 AND 1=1）
            condition-and-alway-true-allow: false
            # 是否检查 DELETE 语句必须带 WHERE 条件
            delete-where-none-check: true
            # 是否检查 UPDATE 语句必须带 WHERE 条件
            update-where-none-check: true
            # 是否允许多语句执行
            multi-statement-allow: true
            # 是否允许非基本语句
            none-base-statement-allow: true
        # 日志输出
        slf4j:
          enabled: true
      # Spring 监控（按需调整包路径）
      aop-patterns: com.example.demo.*.service.*
    # 动态数据源配置
    dynamic:
      # 总开关由 app.datasource.mode 自动派生（本值会被运行时覆盖）
      # 动态数据源下 Druid 配置
      druid:
        # Wall 防火墙配置
        wall:
          # 是否拦截 where 条件恒真（如 WHERE 1=1）
          select-where-alway-true-check: true
          # 是否允许 AND 条件恒真（如 AND 1=1）
          condition-and-alway-true-allow: false
          # 是否检查 DELETE 语句必须带 WHERE 条件
          delete-where-none-check: true
          # 是否检查 UPDATE 语句必须带 WHERE 条件
          update-where-none-check: true
        # 初始化连接数
        initial-size: 1
        # 最小空闲连接数
        min-idle: 1
        # 最大活跃连接数
        max-active: 3
        # 获取连接最大等待时间（ms）
        max-wait: 60000
        # 连接检测间隔（ms）
        time-between-eviction-runs-millis: 60000
        # 连接最小空闲时间（ms）
        min-evictable-idle-time-millis: 300000
        # 连接校验 SQL
        validation-query: SELECT 1
        # 空闲时检测连接
        test-while-idle: true
        # 获取连接时检测
        test-on-borrow: false
        # 归还连接时检测
        test-on-return: false
        # 是否缓存预编译语句
        pool-prepared-statements: true
        # 每连接最大缓存 PS 数
        max-pool-prepared-statement-per-connection-size: 20
        # 启用过滤器
        filters: stat,wall,slf4j
        # 是否回收泄漏连接 建议：开发/联调环境：可以保留，便于发现连接泄漏。生产环境：关闭
        remove-abandoned: true
        # 泄漏连接回收超时（毫秒）
        remove-abandoned-timeout-millis: 180000
        # 是否记录泄漏连接日志
        log-abandoned: false
        # 保活检测
        keep-alive: true
        # 最大空闲时长（毫秒）
        max-evictable-idle-time-millis: 900000
        # 连接属性
        connection-properties:
          druid.stat.mergeSql: true
          druid.stat.slowSqlMillis: 5000
          wall.config.multiStatementAllow: true
          wall.config.noneBaseStatementAllow: true
      # 默认数据源名称
      primary: system_rw
      # 严格匹配模式（true: 未匹配直接报错）
      strict: true
      # 数据源集合
      datasource:
        system_rw:
          # JDBC 连接地址
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          # 数据库用户名
          username: ${DB_SYSTEM_RW_USER:demo_system_rw}
          # 数据库密码
          password: ${DB_SYSTEM_RW_PASSWORD:demo_system_rw}
          # JDBC 驱动类
          driver-class-name: org.postgresql.Driver
          # 连接池实现类
          type: com.alibaba.druid.pool.DruidDataSource
        system_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_SYSTEM_RO_USER:demo_system_ro}
          password: ${DB_SYSTEM_RO_PASSWORD:demo_system_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        order_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_ORDER_RW_USER:demo_order_rw}
          password: ${DB_ORDER_RW_PASSWORD:demo_order_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        order_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_ORDER_RO_USER:demo_order_ro}
          password: ${DB_ORDER_RO_PASSWORD:demo_order_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        notice_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_NOTICE_RW_USER:demo_notice_rw}
          password: ${DB_NOTICE_RW_PASSWORD:demo_notice_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        notice_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_NOTICE_RO_USER:demo_notice_ro}
          password: ${DB_NOTICE_RO_PASSWORD:demo_notice_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        job_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_JOB_RW_USER:demo_job_rw}
          password: ${DB_JOB_RW_PASSWORD:demo_job_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        job_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_JOB_RO_USER:demo_job_ro}
          password: ${DB_JOB_RO_PASSWORD:demo_job_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        log_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_LOG_RW_USER:demo_log_rw}
          password: ${DB_LOG_RW_PASSWORD:demo_log_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        log_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_LOG_RO_USER:demo_log_ro}
          password: ${DB_LOG_RO_PASSWORD:demo_log_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        dict_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_DICT_RW_USER:demo_dict_rw}
          password: ${DB_DICT_RW_PASSWORD:demo_dict_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        dict_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_DICT_RO_USER:demo_dict_ro}
          password: ${DB_DICT_RO_PASSWORD:demo_dict_ro}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        cache_rw:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
          username: ${DB_CACHE_RW_USER:demo_cache_rw}
          password: ${DB_CACHE_RW_PASSWORD:demo_cache_rw}
          driver-class-name: org.postgresql.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        cache_ro:
          url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
