# 缓存配置
cache:
  # 缓存位置：redis | memory（仅限单机部署） | db
  location: redis
  memory:
    # 内存缓存最大条目数（避免 OOM）
    maximum-size: 10000
    # 最大权重（MB，按估算内存权重限制），0 表示不启用权重限制
    maximum-weight-mb: 64
    # 清理间隔（秒），0 表示关闭定时清理
    cleanup-interval-seconds: 60
  db:
    # 数据库缓存最大行数，0 表示不启用限制
    maximum-rows: 100000
    # 清理间隔（秒），0 表示关闭定时清理
    cleanup-interval-seconds: 300
