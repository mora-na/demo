# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # MyBatis 原生配置
  configuration:
    # 是否启用懒加载
    lazy-loading-enabled: true
    # 是否启用激进懒加载
    aggressive-lazy-loading: false
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 逻辑删除字段
      logic-delete-field: is_deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# SQL 日志配置
sql-log:
  # 是否打印 SQL（关闭后禁用 MyBatis SQL 日志）
  enabled: false
